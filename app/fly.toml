app = "throughline-spine"
primary_region = "sjc"

[build]

[mounts]
  source = "throughline_data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/throughline.db"
  PORT = "8080"
  SEED_PATH = "/app/data/seed.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
